<svg width="1000" height="195" viewBox="0 0 1000 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 20px 'Segoe UI', Ubuntu, Sans-Serif, sans-serif; fill: #7aa2f7; }
    .lang-name { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif, sans-serif; fill: #a9b1d6; }
    .lang-pct { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif, sans-serif; fill: #7982a9; }
  </style>

  <rect x="0.5" y="0.5" width="999" height="194" rx="5" fill="#1a1b26" stroke="#383e56" stroke-width="1"/>
  
  <text x="30" y="40" class="title">Most Used Languages</text>
  
  <g transform="translate(30, 60)">
    <mask id="bar-corners">
      <rect width="940" height="12" rx="6" fill="#ffffff" />
    </mask>
    <rect x="0" width="432.4" height="12" fill="#f7df1e" mask="url(#bar-corners)" />
    <rect x="432.4" width="310.2" height="12" fill="#61dafb" mask="url(#bar-corners)" />
    <rect x="742.6" width="112.8" height="12" fill="#ff9e64" mask="url(#bar-corners)" />
    <rect x="855.4" width="84.6" height="12" fill="#9ece6a" mask="url(#bar-corners)" />
  </g>
  
  <g transform="translate(35, 105)">
    <g transform="translate(0, 0)">
      <circle cx="5" cy="5" r="5" fill="#f7df1e" />
      <text x="25" y="9" class="lang-name">JavaScript / Node.js</text>
      <text x="200" y="9" class="lang-pct">46.0%</text>
    </g>
    <g transform="translate(0, 35)">
      <circle cx="5" cy="5" r="5" fill="#ff9e64" />
      <text x="25" y="9" class="lang-name">HTML5 / CSS3 / Pug</text>
      <text x="200" y="9" class="lang-pct">12.0%</text>
    </g>
  </g>

  <g transform="translate(535, 105)">
    <g transform="translate(0, 0)">
      <circle cx="5" cy="5" r="5" fill="#61dafb" />
      <text x="25" y="9" class="lang-name">React.js / Frontend</text>
      <text x="195" y="9" class="lang-pct">33.0%</text>
    </g>
    <g transform="translate(0, 35)">
      <circle cx="5" cy="5" r="5" fill="#9ece6a" />
      <text x="25" y="9" class="lang-name">SQL &amp; NoSQL Databases</text>
      <text x="195" y="9" class="lang-pct">9.0%</text>
    </g>
  </g>
</svg>
