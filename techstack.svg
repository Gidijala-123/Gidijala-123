<svg xmlns="http://www.w3.org/2000/svg" width="850" height="510" viewBox="0 0 850 510" fill="none">
  <style>
    .card {
      fill: #1a1b26;
      stroke: #414868;
      stroke-width: 1.5;
      rx: 12px; /* This sets the perfect smooth, rounded edge */
    }
    .header-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      fill: #7aa2f7;
    }
    .badge-group {
      transform: translate(20px, 45px);
    }
  </style>

